<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Successful - MindFlow Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .callback-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 48px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 500px;
            text-align: center;
        }

        .status-icon {
            font-size: 64px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 16px;
        }

        .message {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 16px 32px;
            background: #fff;
            color: #667eea;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: transform 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .error {
            color: #ff6b6b;
        }

        .loading {
            opacity: 0.7;
        }

        .code-display {
            background: rgba(0, 0, 0, 0.3);
            padding: 16px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            margin: 24px 0;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="callback-container">
        <div class="status-icon" id="status-icon">⏳</div>
        <h1 id="status-title">Processing...</h1>
        <p class="message" id="status-message">Verifying your TikTok authentication...</p>
        <div id="auth-code" class="code-display" style="display: none;"></div>
        <a href="/" class="btn" id="return-btn" style="display: none;">Return to Home</a>
    </div>

    <script>
        // Parse URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const state = urlParams.get('state');
        const error = urlParams.get('error');
        const errorDescription = urlParams.get('error_description');

        // Get stored state from sessionStorage
        const storedState = sessionStorage.getItem('tiktok_oauth_state');

        const statusIcon = document.getElementById('status-icon');
        const statusTitle = document.getElementById('status-title');
        const statusMessage = document.getElementById('status-message');
        const authCodeDisplay = document.getElementById('auth-code');
        const returnBtn = document.getElementById('return-btn');

        function showSuccess() {
            statusIcon.textContent = '✅';
            statusTitle.textContent = 'Login Successful!';
            statusMessage.textContent = 'Your TikTok account has been connected to MindFlow Studio.';
            authCodeDisplay.textContent = `Authorization Code: ${code}`;
            authCodeDisplay.style.display = 'block';
            returnBtn.style.display = 'inline-block';

            // In production, send the code to your backend
            // fetch('/api/tiktok/callback', {
            //     method: 'POST',
            //     headers: { 'Content-Type': 'application/json' },
            //     body: JSON.stringify({ code, state })
            // });
        }

        function showError(message) {
            statusIcon.textContent = '❌';
            statusTitle.textContent = 'Authentication Failed';
            statusMessage.innerHTML = `<span class="error">${message}</span>`;
            returnBtn.style.display = 'inline-block';
        }

        // Process callback
        if (error) {
            showError(errorDescription || 'An error occurred during authentication.');
        } else if (!code) {
            showError('No authorization code received from TikTok.');
        } else if (!state) {
            showError('Missing state parameter. Possible CSRF attack.');
        } else if (state !== storedState) {
            showError('State mismatch. Possible CSRF attack.');
        } else {
            // Success
            sessionStorage.removeItem('tiktok_oauth_state');
            showSuccess();
        }
    </script>
</body>
</html>
